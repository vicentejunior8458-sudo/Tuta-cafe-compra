<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUTA CAFÉ - Acesso Corretor</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3e2723; --creme: #fff8e1; }
        body { font-family: sans-serif; background: #f5f5f5; margin:0; padding: 10px; }
        .card { max-width: 500px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .login-box { padding: 30px; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; }
        .price-bar { background: #efebe9; padding: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; font-size: 11px; text-align: center; border-bottom: 1px solid #d7ccc8; }
        .section { padding: 15px; border-bottom: 1px solid #eee; }
        .badge-user { background: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>TUTA CAFÉ</h1>
        <small id="userDisplay"></small>
    </div>

    <div id="loginArea" class="login-box">
        <h3>Acesso Restrito</h3>
        <input type="text" id="login_user" placeholder="Usuário">
        <input type="password" id="login_pass" placeholder="Senha">
        <button class="btn-main" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="compraArea" style="display:none">
        <div class="price-bar">
            <div>NOVO<br><strong id="p1">---</strong></div>
            <div>VELHO<br><strong id="p2">---</strong></div>
            <div>300 DEF<br><strong id="p3">---</strong></div>
        </div>

        <form id="formCompra">
            <div class="section">
                <div class="badge-user">Corretor Ativo: <span id="nomeLogado"></span></div>
                <input type="text" id="nome" required placeholder="Nome do Produtor">
                <input type="text" id="cpf" inputmode="numeric" required placeholder="CPF/CNPJ">
                <input type="text" id="sefaz" required placeholder="Senha SEFAZ">
            </div>

            <div class="section">
                <select id="banco">
                    <option value="756-SICOOB">756 - SICOOB</option>
                    <option value="748-SICREDI">748 - SICREDI</option>
                    <option value="001-BB">001 - BANCO DO BRASIL</option>
                    <option value="237-BRADESCO">237 - BRADESCO</option>
                    <option value="104-CAIXA">104 - CAIXA</option>
                    <option value="260-NUBANK">260 - NUBANK</option>
                </select>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <input type="text" id="agencia" inputmode="numeric" placeholder="Agência">
                    <input type="text" id="conta" inputmode="numeric" placeholder="Conta">
                </div>
            </div>

            <div class="section">
                <select id="tipoCafe">
                    <option>Café Novo (até 200 def)</option>
                    <option>Café Velho (até 200 def)</option>
                    <option>Café (até 300 def)</option>
                </select>
                <input type="number" id="qtd" step="0.1" placeholder="Quantidade">
                <input type="text" id="armazem" placeholder="Local de Retirada">
                <textarea id="obs" rows="2" placeholder="Observações"></textarea>
            </div>
            
            <div style="padding:15px">
                <div id="msgSucesso" style="display:none; color:green; font-weight:bold; text-align:center; margin-bottom:10px">✅ REGISTRADO!</div>
                <button type="submit" id="btn" class="btn-main">REGISTRAR COMPRA</button>
                <button type="button" onclick="logout()" style="background:none; color:red; font-size:11px; margin-top:10px">Sair / Trocar Usuário</button>
            </div>
        </form>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDE87l7QnjS48AT8jLOGLBDP2vwyGyHNEs",
        authDomain: "sistemacafe-e4a42.firebaseapp.com",
        databaseURL: "https://sistemacafe-e4a42-default-rtdb.firebaseio.com", 
        projectId: "sistemacafe-e4a42",
        storageBucket: "sistemacafe-e4a42.firebasestorage.app",
        messagingSenderId: "483940361596",
        appId: "1:483940361596:web:4418541808c717276c70f9"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let corretorAtual = localStorage.getItem('tuta_corretor');

    if(corretorAtual) { mostrarCompra(); }

    function fazerLogin() {
        const u = document.getElementById('login_user').value.toLowerCase().trim();
        const s = document.getElementById('login_pass').value.trim();
        
        database.ref('usuarios/' + u).once('value', snap => {
            if(snap.exists() && snap.val().senha === s) {
                localStorage.setItem('tuta_corretor', u);
                corretorAtual = u;
                mostrarCompra();
            } else { alert("Usuário ou senha inválidos!"); }
        });
    }

    function mostrarCompra() {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('compraArea').style.display = 'block';
        document.getElementById('nomeLogado').innerText = corretorAtual.toUpperCase();
        carregarPrecos();
    }

    function carregarPrecos() {
        database.ref('precos').on('value', snap => {
            const p = snap.val();
            if(p) {
                document.getElementById('p1').innerText = "R$ " + p.novo200;
                document.getElementById('p2').innerText = "R$ " + p.velho200;
                document.getElementById('p3').innerText = "R$ " + p.def300;
            }
        });
    }

    function logout() { localStorage.removeItem('tuta_corretor'); location.reload(); }

    document.getElementById('formCompra').onsubmit = (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true;

        const data = {
            corretor: corretorAtual,
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            sefaz: document.getElementById('sefaz').value,
            banco: document.getElementById('banco').value,
            agencia: document.getElementById('agencia').value,
            conta: document.getElementById('conta').value,
            tipoCafe: document.getElementById('tipoCafe').value,
            qtd: document.getElementById('qtd').value,
            armazem: document.getElementById('armazem').value,
            observacao: document.getElementById('obs').value,
            status: "PENDENTE",
            dataHr: new Date().toLocaleString('pt-BR')
        };

        database.ref('compras').push(data).then(() => {
            document.getElementById('formCompra').reset();
            const msg = document.getElementById('msgSucesso');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; btn.disabled = false; }, 3000);
        });
    };
</script>
</body>
</html>
