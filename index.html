<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUTA CAFÉ - Nova Compra</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --cafe-escura: #3e2723; --cafe-media: #5d4037; --creme: #fff8e1; }
        body { font-family: sans-serif; background-color: var(--creme); margin: 0; padding: 10px; }
        .form-card { background: white; max-width: 480px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .painel-precos { background: #efebe9; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--cafe-escura); }
        .painel-precos p { margin: 5px 0; font-size: 13px; font-weight: bold; color: var(--cafe-escura); }
        h1 { color: var(--cafe-escura); text-align: center; font-size: 22px; margin-bottom: 20px; }
        fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        legend { font-weight: bold; font-size: 12px; color: var(--cafe-media); }
        label { display: block; margin: 8px 0 3px; font-weight: bold; font-size: 12px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { width: 100%; background: var(--cafe-escura); color: white; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; }
        #mensagemSucesso { display:none; background:#e8f5e9; color:#2e7d32; padding:15px; border-radius:8px; text-align:center; margin: 10px 0; font-weight:bold; }
    </style>
</head>
<body>

<div class="form-card">
    <h1>TUTA CAFÉ</h1>

    <div class="painel-precos">
        <p>📈 COTAÇÃO DO DIA (SACA):</p>
        <p>• Novo (até 200 def): <span id="view_novo">Carregando...</span></p>
        <p>• Velho (até 200 def): <span id="view_velho">Carregando...</span></p>
        <p>• Até 300 def: <span id="view_300">Carregando...</span></p>
    </div>
    
    <form id="formCompra">
        <fieldset>
            <legend>PRODUTOR</legend>
            <label>Nome</label><input type="text" id="nome" required>
            <div class="grid">
                <div><label>CPF/CNPJ</label><input type="text" id="cpf" inputmode="numeric" required></div>
                <div><label>SEFAZ</label><input type="text" id="sefaz" required></div>
            </div>
        </fieldset>

        <fieldset>
            <legend>BANCO</legend>
            <label>Banco</label>
            <select id="banco">
                <option value="Bradesco">Bradesco</option>
                <option value="Sicoob">Sicoob</option>
                <option value="Banco do Brasil">Banco do Brasil</option>
                <option value="Caixa">Caixa</option>
                <option value="Nubank">Nubank</option>
                <option value="Sicredi">Sicredi</option>
            </select>
            <div class="grid">
                <div><label>Agência</label><input type="text" id="agencia" inputmode="numeric" required></div>
                <div><label>Conta</label><input type="text" id="conta" inputmode="numeric" required></div>
            </div>
        </fieldset>

        <fieldset>
            <legend>CAFÉ</legend>
            <label>Tipo de Café</label>
            <select id="tipoCafe">
                <option>Café Novo (até 200 def)</option>
                <option>Café Velho (até 200 def)</option>
                <option>Café (até 300 def)</option>
            </select>
            <div class="grid">
                <div><label>Quantidade</label><input type="number" id="qtd" step="0.1" required></div>
                <div><label>Unidade</label><select id="unidade"><option>Sacas</option><option>Kg</option></select></div>
            </div>
            <label>Armazém</label><input type="text" id="armazem" required>
        </fieldset>

        <div id="mensagemSucesso"></div>
        <button type="submit" id="btn">REGISTRAR COMPRA</button>
    </form>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDE87l7QnjS48AT8jLOGLBDP2vwyGyHNEs",
        authDomain: "sistemacafe-e4a42.firebaseapp.com",
        databaseURL: "https://sistemacafe-e4a42-default-rtdb.firebaseio.com", 
        projectId: "sistemacafe-e4a42",
        storageBucket: "sistemacafe-e4a42.firebasestorage.app",
        messagingSenderId: "483940361596",
        appId: "1:483940361596:web:4418541808c717276c70f9"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Ler Preços do ADM
    database.ref('precos').on('value', (snap) => {
        const p = snap.val();
        if(p) {
            document.getElementById('view_novo').innerText = "R$ " + p.novo200;
            document.getElementById('view_velho').innerText = "R$ " + p.velho200;
            document.getElementById('view_300').innerText = "R$ " + p.def300;
        }
    });

    document.getElementById('formCompra').onsubmit = (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const data = {
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            sefaz: document.getElementById('sefaz').value,
            banco: document.getElementById('banco').value,
            agencia: document.getElementById('agencia').value,
            conta: document.getElementById('conta').value,
            tipoCafe: document.getElementById('tipoCafe').value,
            armazem: document.getElementById('armazem').value,
            qtd: document.getElementById('qtd').value,
            unidade: document.getElementById('unidade').value,
            dataHr: new Date().toLocaleString('pt-BR')
        };

        database.ref('compras').push(data).then(() => {
            document.getElementById('formCompra').reset();
            const msg = document.getElementById('mensagemSucesso');
            msg.style.display = 'block';
            msg.innerText = "✅ Sucesso! Registro concluído.";
            btn.disabled = false;
            btn.innerText = "REGISTRAR COMPRA";
            setTimeout(() => msg.style.display = 'none', 5000);
        });
    };
</script>
</body>
</html>
