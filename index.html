<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUTA CAFÉ - Nova Compra</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --cafe-escura: #3e2723; /* Marrom Café Forte */
            --cafe-media: #5d4037;  /* Marrom Médio */
            --cafe-clara: #a1887f;  /* Bege Café com Leite */
            --creme: #fff8e1;        /* Creme Suave */
            --sucesso: #388e3c;     /* Verde Folha de Café */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--creme);
            background-image: url('https://www.transparenttextures.com/patterns/coffee-beans.png'); /* Padrão sutil de grãos */
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-card {
            background: white;
            width: 100%;
            max-width: 480px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(62, 39, 35, 0.2);
            border: 2px solid var(--cafe-clara);
            position: relative;
            overflow: hidden;
        }

        /* Detalhe visual de xícara no topo */
        .form-card::before {
            content: '☕';
            position: absolute;
            top: -15px;
            right: -15px;
            font-size: 60px;
            opacity: 0.1;
            color: var(--cafe-escura);
        }

        h1 {
            color: var(--cafe-escura);
            text-align: center;
            font-size: 24px;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: var(--cafe-media);
            font-size: 14px;
            margin-bottom: 30px;
            font-style: italic;
        }

        fieldset {
            border: 1px solid var(--cafe-clara);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #fafafa;
        }

        legend {
            color: var(--cafe-media);
            font-weight: bold;
            padding: 0 10px;
            font-size: 12px;
            text-transform: uppercase;
        }

        label {
            display: block;
            margin: 12px 0 5px;
            font-weight: 600;
            font-size: 13px;
            color: var(--cafe-escura);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: white;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--cafe-media);
            outline: none;
            box-shadow: 0 0 5px rgba(93, 64, 55, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--cafe-media) 0%, var(--cafe-escura) 100%);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(62, 39, 35, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(62, 39, 35, 0.3);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .footer-logo {
            text-align: center;
            margin-top: 25px;
            color: var(--cafe-clara);
            font-size: 12px;
        }

        /* Responsividade para telas muito pequenas */
        @media (max-width: 400px) {
            .grid { grid-template-columns: 1fr; gap: 0; }
            .form-card { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="form-card">
    <h1>SISTEMA DE COMPRA</h1>
    <div class="subtitle">TUTA CAFÉ - O sabor da nossa terra</div>
    
    <form id="formCompra">

            <div class="grid">
                <div><label>CPF / CNPJ</label><input type="text" id="cpf" required placeholder="000.000.000-00"></div>
                <div><label>Senha SEFAZ (Nota)</label><input type="text" id="sefaz" required placeholder="Senha visível"></div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Dados para Pagamento</legend>
        <label>Banco</label>

        <option value="037">037 - BANPARA - Banco do Estado do Pará S.A.</option>
        <option value="041">041 - Banrisul - Banco do Estado do Rio Grande do Sul S.A.</option>
        <option value="047">047 - Banco do Estado de Sergipe S.A.</option>
        <option value="070">070 - BRB - Banco de Brasília S.A.</option>
        <option value="085">085 - Cooperativa Central de Crédito Ailos</option>
        <option value="136">136 - CONFEDERAÇÃO NACIONAL DAS COOPERATIVAS UNICRED</option>
        <option value="197">197 - Stone Pagamentos S.A.</option>
        <option value="208">208 - Banco BTG Pactual S.A.</option>
        <option value="212">212 - Banco Original S.A.</option>
        <option value="218">218 - Banco BS2 S.A.</option>
        <option value="233">233 - Banco Cifra S.A.</option>
        <option value="290">290 - PagSeguro Internet S.A. (PagBank)</option>
        <option value="318">318 - Banco BMG S.A.</option>
        <option value="323">323 - Mercado Pago - Conta do Mercado Livre</option>
        <option value="335">335 - Banco Digio S.A.</option>
        <option value="336">336 - Banco C6 S.A. (C6 Bank)</option>
        <option value="389">389 - Banco Mercantil do Brasil S.A.</option>
        <option value="422">422 - Banco Safra S.A.</option>
        <option value="633">633 - Banco Rendimento S.A.</option>
        <option value="655">655 - Banco Votorantim S.A.</option>
        <option value="707">707 - Banco Daycoval S.A.</option>
        <option value="735">735 - Banco Neon S.A.</option>
    </optgroup>
</select>
            <div class="grid">
                <div><label>Agência</label><input type="text" id="agencia" required placeholder="Sem dígito"></div>
                <div><label>Tipo de Conta</label>
                    <select id="tipoConta"><option>Corrente</option><option>Poupança</option></select>
                </div>
            </div>

            <label>Número da Conta (com Dígito)</label>
            <input type="text" id="conta" required placeholder="Ex: 12345-6">
        </fieldset>

        <fieldset>
            <legend>Detalhes da Mercadoria</legend>
            
            <label>Localização (Armazém)</label>
            <input type="text" id="armazem" required placeholder="Ex: Armazém Central Tuta / Sítio Próprio">

            <div class="grid">
                <div>
                    <label>Quantidade</label>
                    <input type="number" id="qtd" step="0.1" required placeholder="0.0">
                </div>
                <div>
                    <label>Unidade</label>
                    <select id="unidade">
                        <option value="Sacas (60kg)">Sacas (60kg)</option>
                        <option value="Quilos (kg)">Quilos (kg)</option>
                    </select>
                </div>
            </div>

            <label>Observações Adicionais</label>
            <textarea id="observacao" rows="3" 
                style="width: 100%; border-radius: 8px; border: 1px solid #ccc; padding: 10px; font-family: sans-serif; font-size: 14px; resize: none;" 
                placeholder="Ex: Café cereja descascado, lote 12, entrega após dia 10..."></textarea>
        </fieldset>


        <button type="submit" id="btn">REGISTRAR COMPRA TUTA</button>
    </form>
    
    <div class="footer-logo">☕ TUTA CAFÉ - Qualidade que entusiasma</div>
</div>

const app = initializeApp(firebaseConfig);

    // Lógica de Envio
    document.getElementById('formCompra').onsubmit = (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.innerText = "☕ ENVIANDO DADOS...";
        btn.disabled = true;
        
        const data = {
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            sefaz: document.getElementById('sefaz').value,
            banco: document.getElementById('banco').value,
            agencia: document.getElementById('agencia').value,
            conta: document.getElementById('conta').value,
            tipo: document.getElementById('tipoConta').value,
            qtd: document.getElementById('qtd').value,
            unidade: document.getElementById('unidade').value,
            timestamp: firebase.database.ServerValue.TIMESTAMP, // Hora do servidor
            dataHr: new Date().toLocaleString('pt-BR') // Hora local formatada
        };

        // Salvar no nó 'compras'
        database.ref('compras').push(data)
            .then(() => {
                alert("✅ Sucesso! A compra de " + data.nome + " foi registrada no TUTA CAFÉ.");
                document.getElementById('formCompra').reset();
            })

                alert("❌ Erro ao salvar: " + error.message);

</script>
</body>
</html>
