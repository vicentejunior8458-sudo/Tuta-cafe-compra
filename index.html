<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuta Café | Broker App</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3e2723; --gold: #bcaaa4; --bg: #f8f9fa; --success: #2e7d32; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #212529; }
        
        /* Cabeçalho Premium */
        .app-header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .app-header h1 { margin: 0; font-size: 28px; letter-spacing: 3px; font-weight: 700; }
        .app-header p { margin: 10px 0 0; opacity: 0.7; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 480px; margin: -30px auto 40px; padding: 0 15px; }
        
        /* Painel de Cotações Estilo Bolsa */
        .price-panel { background: white; border-radius: 20px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .price-card { text-align: center; padding: 10px; border-radius: 12px; background: #fafafa; border: 1px solid #eee; }
        .price-card span { display: block; font-size: 10px; color: #888; font-weight: 600; margin-bottom: 5px; }
        .price-card strong { font-size: 15px; color: var(--primary); display: block; }

        /* Estilo dos Cards de Formulário */
        .glass-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .section-tag { display: inline-block; background: var(--creme); color: var(--primary); font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #d7ccc8; }
        
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: #e8f5e9; padding: 10px 15px; border-radius: 50px; width: fit-content; }
        .user-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; }

        label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 8px; margin-left: 4px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 15px; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; transition: 0.3s; box-sizing: border-box; background: #fcfcfc; }
        input:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(62, 39, 35, 0.05); }

        .btn-submit { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: 700; width: 100%; cursor: pointer; box-shadow: 0 10px 20px rgba(62, 39, 35, 0.2); transition: 0.3s; }
        .btn-submit:active { transform: scale(0.96); }
        
        /* Login */
        .login-screen { padding: 40px 20px; text-align: center; }
        .login-screen input { margin-bottom: 10px; text-align: center; }

        #msgSucesso { display:none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="msgSucesso">✅ COMPRA REGISTRADA!</div>

<header class="app-header">
    <h1>TUTA CAFÉ</h1>
    <p>Plataforma do Corretor</p>
</header>

<div class="container">
    
    <div id="loginArea" class="glass-card login-screen">
        <span class="section-tag">ACESSO RESTRITO</span>
        <input type="text" id="l_user" placeholder="Nome de Usuário">
        <input type="password" id="l_pass" placeholder="Senha de Acesso">
        <button class="btn-submit" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="mainArea" style="display:none">
        
        <div class="price-panel">
            <div class="price-card"><span>NOVO 200</span><strong id="v1">---</strong></div>
            <div class="price-card"><span>VELHO 200</span><strong id="v2">---</strong></div>
            <div class="price-card"><span>ATÉ 300</span><strong id="v3">---</strong></div>
        </div>

        <div class="user-info">
            <div class="user-dot"></div>
            <span style="font-size: 12px; font-weight: 700;" id="corretorNome">CORRETOR</span>
        </div>

        <form id="formCompra">
            <div class="glass-card">
                <span class="section-tag">01. DADOS DO PRODUTOR</span>
                <label>Nome Completo</label>
                <input type="text" id="nome" required placeholder="João Silva">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>CPF/CNPJ</label><input type="text" id="cpf" inputmode="numeric" required placeholder="000.000.000-00"></div>
                    <div><label>Senha SEFAZ</label><input type="text" id="sefaz" required placeholder="Senha"></div>
                </div>
            </div>

            <div class="glass-card">
                <span class="section-tag">02. PAGAMENTO</span>
                <label>Banco</label>
                <select id="banco">
                    <option value="756-SICOOB">756 - SICOOB</option>
                    <option value="748-SICREDI">748 - SICREDI</option>
                    <option value="001-BB">001 - BANCO DO BRASIL</option>
                    <option value="237-BRADESCO">237 - BRADESCO</option>
                    <option value="260-NUBANK">260 - NUBANK</option>
                    <option value="Outro">Outro Banco</option>
                </select>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>Agência</label><input type="text" id="agencia" inputmode="numeric"></div>
                    <div><label>Conta</label><input type="text" id="conta" inputmode="numeric"></div>
                </div>
            </div>

            <div class="glass-card">
                <span class="section-tag">03. CARGA E LOCAL</span>
                <label>Classificação</label>
                <select id="tipoCafe">
                    <option>Café Novo (até 200 def)</option>
                    <option>Café Velho (até 200 def)</option>
                    <option>Café (até 300 def)</option>
                </select>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>Qtd</label><input type="number" id="qtd" step="0.1"></div>
                    <div><label>Unidade</label><select id="unidade"><option>Sacas</option><option>Kg</option></select></div>
                </div>
                <label>Armazém / Localidade</label>
                <input type="text" id="armazem" placeholder="Ex: Galpão Central">
                <label>Observações Adicionais</label>
                <textarea id="obs" rows="2" placeholder="Chave PIX ou detalhes..."></textarea>
            </div>

            <button type="submit" id="btnSalvar" class="btn-submit">CONFIRMAR E REGISTRAR</button>
            <p onclick="logout()" style="text-align:center; color:#999; font-size:12px; margin-top:20px; cursor:pointer">Encerrar Sessão</p>
        </form>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDE87l7QnjS48AT8jLOGLBDP2vwyGyHNEs",
        authDomain: "sistemacafe-e4a42.firebaseapp.com",
        databaseURL: "https://sistemacafe-e4a42-default-rtdb.firebaseio.com", 
        projectId: "sistemacafe-e4a42",
        storageBucket: "sistemacafe-e4a42.firebasestorage.app",
        messagingSenderId: "483940361596",
        appId: "1:483940361596:web:4418541808c717276c70f9"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let user = localStorage.getItem('tuta_user');
    if(user) { logar(user); }

    function fazerLogin() {
        const u = document.getElementById('l_user').value.toLowerCase().trim();
        const s = document.getElementById('l_pass').value.trim();
        database.ref('usuarios/' + u).once('value', snap => {
            if(snap.exists() && snap.val().senha === s) {
                localStorage.setItem('tuta_user', u);
                logar(u);
            } else { alert("Acesso Negado!"); }
        });
    }

    function logar(nome) {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('mainArea').style.display = 'block';
        document.getElementById('corretorNome').innerText = nome.toUpperCase();
        
        database.ref('precos').on('value', snap => {
            const p = snap.val();
            if(p){
                document.getElementById('v1').innerText = "R$ " + p.novo200;
                document.getElementById('v2').innerText = "R$ " + p.velho200;
                document.getElementById('v3').innerText = "R$ " + p.def300;
            }
        });
    }

    function logout() { localStorage.removeItem('tuta_user'); location.reload(); }

    document.getElementById('formCompra').onsubmit = (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSalvar');
        btn.disabled = true; btn.innerText = "REGISTRANDO...";

        const data = {
            corretor: localStorage.getItem('tuta_user'),
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            sefaz: document.getElementById('sefaz').value,
            banco: document.getElementById('banco').value,
            agencia: document.getElementById('agencia').value,
            conta: document.getElementById('conta').value,
            tipoCafe: document.getElementById('tipoCafe').value,
            qtd: document.getElementById('qtd').value,
            unidade: document.getElementById('unidade').value,
            armazem: document.getElementById('armazem').value,
            observacao: document.getElementById('obs').value,
            status: "PENDENTE",
            dataHr: new Date().toLocaleString('pt-BR')
        };

        database.ref('compras').push(data).then(() => {
            document.getElementById('formCompra').reset();
            const msg = document.getElementById('msgSucesso');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; location.reload(); }, 2500);
        });
    };
</script>
</body>
</html>
