<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUTA CAFÉ - Nova Compra</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --cafe-escura: #3e2723; --cafe-media: #5d4037; --creme: #fff8e1; }
        body { font-family: sans-serif; background-color: var(--creme); background-image: url('https://www.transparenttextures.com/patterns/coffee-beans.png'); margin: 0; padding: 10px; }
        .form-card { background: white; max-width: 480px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #a1887f; }
        h1 { color: var(--cafe-escura); text-align: center; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--cafe-media); margin-bottom: 25px; font-style: italic; font-size: 14px; }
        fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        legend { font-weight: bold; color: var(--cafe-media); font-size: 12px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; background: var(--cafe-escura); color: white; padding: 18px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="form-card">
    <h1>TUTA CAFÉ</h1>
    <div class="subtitle">Sistema de Compra Direta</div>
    
    <form id="formCompra">
        <fieldset>
            <legend>DADOS DO PRODUTOR</legend>
            <label>Nome / Razão Social</label>
            <input type="text" id="nome" required>
            <div class="grid">
                <div><label>CPF/CNPJ</label><input type="text" id="cpf" required></div>
                <div><label>Senha SEFAZ</label><input type="text" id="sefaz" required></div>
            </div>
        </fieldset>

        <fieldset>
            <legend>PAGAMENTO</legend>
            <label>Banco</label>
            <select id="banco">
                <option value="001">001 - Banco do Brasil</option>
                <option value="237">237 - Bradesco</option>
                <option value="756">756 - Sicoob</option>
                <option value="104">104 - Caixa</option>
                <option value="260">260 - Nubank</option>
            </select>
            <div class="grid">
                <div><label>Agência</label><input type="text" id="agencia" required></div>
                <div><label>Conta</label><input type="text" id="conta" required></div>
            </div>
            <label>Tipo</label>
            <select id="tipoConta"><option>Corrente</option><option>Poupança</option></select>
        </fieldset>

        <fieldset>
            <legend>MERCADORIA</legend>
            <label>Armazém (Onde está o café?)</label>
            <input type="text" id="armazem" required placeholder="Ex: Sítio ou Armazém Central">
            <div class="grid">
                <div><label>Qtd</label><input type="number" id="qtd" step="0.1" required></div>
                <div><label>Unidade</label><select id="unidade"><option>Sacas (60kg)</option><option>Quilos (kg)</option></select></div>
            </div>
            <label>Observações</label>
            <textarea id="observacao" rows="2"></textarea>
        </fieldset>

<div id="mensagemSucesso" style="display:none; background:#e8f5e9; color:#2e7d32; padding:15px; border-radius:8px; text-align:center; margin-top:15px; font-weight:bold; border: 1px solid #c8e6c9;">
    ✅ Compra registrada com sucesso!
</div>


<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDE87l7QnjS48AT8jLOGLBDP2vwyGyHNEs",
        authDomain: "sistemacafe-e4a42.firebaseapp.com",
        databaseURL: "https://sistemacafe-e4a42-default-rtdb.firebaseio.com", 
        projectId: "sistemacafe-e4a42",
        storageBucket: "sistemacafe-e4a42.firebasestorage.app",
        messagingSenderId: "483940361596",
        appId: "1:483940361596:web:4418541808c717276c70f9",
        measurementId: "G-BZEK0SJ5WD"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    document.getElementById('formCompra').onsubmit = (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.innerText = "ENVIANDO...";
        btn.disabled = true;

        const data = {
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            sefaz: document.getElementById('sefaz').value,
            banco: document.getElementById('banco').value,
            agencia: document.getElementById('agencia').value,
            conta: document.getElementById('conta').value,
            tipo: document.getElementById('tipoConta').value,
            armazem: document.getElementById('armazem').value,
            qtd: document.getElementById('qtd').value,
            unidade: document.getElementById('unidade').value,
            observacao: document.getElementById('observacao').value,
            dataHr: new Date().toLocaleString('pt-BR'),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        database.ref('compras').push(data).then(() => {
            alert("✅ Compra de " + data.nome + " registrada!");
            document.getElementById('formCompra').reset();
            btn.innerText = "REGISTRAR COMPRA";
            btn.disabled = false;
        }).catch(err => { alert("Erro: " + err.message); btn.disabled = false; });
    };
</script>
</body>
</html>
